<nav class="sticky top-0 z-50 w-full backdrop-blur-md bg-slate-900/80 border-b border-slate-800">
  <div class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="flex items-center justify-between h-16">
      <div class="flex-shrink-0">
        <span class="text-xl font-bold bg-gradient-to-r from-sky-400 to-blue-500 bg-clip-text text-transparent">
          AS
        </span>
      </div>
      
      <div class="hidden md:block">
        <div class="ml-10 flex items-center space-x-1">
          @for (item of navItems; track item) {
            <button
              (click)="onSectionChange(item)"
              class="px-3 py-2 rounded-md text-sm font-medium transition-colors"
              [ngClass]="{
                'text-sky-400 bg-slate-800/50': currentSection === item,
                'text-slate-300 hover:text-white hover:bg-slate-800': currentSection !== item
              }"
            >
              {{ item }}
            </button>
          }
        </div>
      </div>

      <div>
        <button
          (click)="onSwitchMode()"
          class="flex items-center gap-2 px-4 py-2 rounded-lg bg-slate-800 hover:bg-slate-700 text-slate-300 transition-colors border border-slate-700 hover:border-slate-600 text-sm font-medium"
        >
          <lucide-icon [img]="TerminalIcon" class="w-4 h-4"></lucide-icon>
          <span class="hidden sm:inline">Terminal Mode</span>
        </button>
      </div>
    </div>
  </div>
  
  <!-- Mobile nav -->
  <div class="md:hidden overflow-x-auto border-t border-slate-800/50">
    <div class="flex px-4 py-2 space-x-2">
      @for (item of navItems; track item) {
        <button
          (click)="onSectionChange(item)"
          class="whitespace-nowrap px-3 py-1.5 rounded-md text-sm font-medium transition-colors"
          [ngClass]="{
            'text-sky-400 bg-slate-800': currentSection === item,
            'text-slate-300 hover:text-white': currentSection !== item
          }"
        >
          {{ item }}
        </button>
      }
    </div>
  </div>
</nav>
