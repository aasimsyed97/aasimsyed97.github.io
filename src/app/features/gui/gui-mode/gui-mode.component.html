<div class="min-h-screen bg-slate-900 text-slate-200 font-sans">
  <app-navbar 
    [currentSection]="currentSection" 
    (sectionChange)="onSectionChange($event)" 
    (switchMode)="onSwitchMode()"
  ></app-navbar>
  
  <main class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 py-8 md:py-12">
    @switch (currentSection) {
      @case ('Home') {
        <app-home (navigate)="onSectionChange($event)"></app-home>
      }
      @case ('Skills') {
        <app-skills></app-skills>
      }
      @case ('Projects') {
        <app-projects></app-projects>
      }
      @case ('Experience') {
        <app-experience></app-experience>
      }
      @case ('Contact') {
        <app-contact></app-contact>
      }
      @default {
        <app-home (navigate)="onSectionChange($event)"></app-home>
      }
    }
  </main>

  <footer class="py-6 text-center text-slate-500 text-sm border-t border-slate-800/50 mt-auto">
    <p>&copy; {{ currentYear }} Aasim Syed. Built with Angular & Tailwind CSS.</p>
  </footer>
</div>
