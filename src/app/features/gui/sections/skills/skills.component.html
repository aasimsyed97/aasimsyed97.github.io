<div class="animate-in fade-in slide-in-from-bottom-4 duration-500">
  <div class="space-y-8">
    <div class="space-y-2">
      <h2 class="text-3xl font-bold text-white tracking-tight">Technical Arsenal</h2>
      <p class="text-slate-400">Core technologies and tools I work with.</p>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
      @for (group of skills; track group.category) {
        <div class="bg-slate-800/50 border border-slate-700/50 rounded-xl p-6 backdrop-blur-sm hover:border-slate-600/50 transition-colors">
          <h3 class="text-lg font-semibold text-sky-400 mb-4">{{ group.category }}</h3>
          <div class="flex flex-wrap gap-2">
            @for (item of group.items; track item) {
              <span class="px-3 py-1.5 bg-slate-900 border border-slate-700 rounded-lg text-sm text-slate-300">
                {{ item }}
              </span>
            }
          </div>
        </div>
      }
    </div>
  </div>
</div>
