<div class="animate-in fade-in slide-in-from-bottom-4 duration-500">
  <div class="space-y-8 max-w-4xl">
    <div class="space-y-2">
      <h2 class="text-3xl font-bold text-white tracking-tight">Professional Journey</h2>
      <p class="text-slate-400">My trajectory in software engineering.</p>
    </div>

    <div class="relative border-l border-slate-700/50 ml-3 md:ml-4 space-y-12 pb-4">
      @for (exp of experience; track exp.role) {
        <div class="relative pl-8 md:pl-10">
          <div class="absolute w-6 h-6 bg-slate-900 rounded-full -left-3 border-2 border-sky-500/50 flex items-center justify-center">
            <div class="w-2 h-2 bg-sky-400 rounded-full"></div>
          </div>

          <div class="flex flex-col md:flex-row md:items-start justify-between gap-4 mb-4">
            <div>
              <h3 class="text-xl font-bold text-slate-200 flex items-center gap-2">
                {{ exp.role }}
              </h3>
              <div class="flex items-center gap-2 text-sky-400 font-medium mt-1">
                <lucide-icon [img]="BriefcaseIcon" class="w-4 h-4"></lucide-icon>
                <span>{{ exp.company }}</span>
              </div>
            </div>
            
            <div class="flex items-center gap-2 text-slate-400 text-sm bg-slate-800/50 px-3 py-1.5 rounded-full border border-slate-700/50 w-fit">
              <lucide-icon [img]="CalendarIcon" class="w-4 h-4"></lucide-icon>
              <span>{{ exp.period }}</span>
            </div>
          </div>

          <div class="bg-slate-800/30 rounded-xl p-5 border border-slate-700/30">
            <ul class="space-y-3">
              @for (point of exp.points; track point) {
                <li class="flex items-start gap-3 text-slate-300">
                  <span class="text-sky-500 mt-1.5 opacity-50">▹</span>
                  <span class="leading-relaxed">{{ point }}</span>
                </li>
              }
            </ul>
          </div>
        </div>
      }
    </div>
  </div>
</div>
